config:
  target: "http://localhost:3000/internal/api/v1/releases"
  phases:
    - duration: 30
      arrivalRate: 100

    - duration: 60
      arrivalRate: 150

  defaults:
    headers:
      Content-Type: "application/json"
      X-API-KEY: "project-api-key-here......"
      X-PROJECT-ID: "project-id-here......"

scenarios:
  - flow:
      - get:
          url: "/latest?channel=production"
      - think: "{{ $randomNumber(2, 5) }}"
